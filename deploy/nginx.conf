# /etc/nginx/sites-available/pr-reviewer
# Reverse proxy: public :80 (and :443 once you add TLS) -> uvicorn on 127.0.0.1:8000
#
# After placing this file:
#   sudo ln -s /etc/nginx/sites-available/pr-reviewer /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# For HTTPS (strongly recommended for a public webhook endpoint), run:
#   sudo certbot --nginx -d your.domain.com
# Certbot will rewrite this file to add the :443 server block automatically.

server {
    listen 80;
    server_name _;  # replace with your domain once you have one

    # GitHub webhook payloads can be large for big PRs.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
